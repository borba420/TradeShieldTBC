name: release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build release zip
        run: |
          zip -r TradeShieldTBC.zip CHANGELOG.md Core.lua TradeShieldTBC.toc

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: TradeShieldTBC.zip
          token: ${{ github.token }}
          name: "TradeShieldTBC ${{ github.ref_name }}"
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true

      - name: Upload to CurseForge
        if: startsWith(github.ref, 'refs/tags/') && (secrets.CF_API_KEY != '' || secrets.CURSEFORGE_API_TOKEN != '') && (secrets.CURSEFORGE_PROJECT_ID != '' || secrets.CURSEFORGE_PROJECT != '')
        uses: itsmeow/curseforge-upload@v3.1.2
        with:
          token: ${{ secrets.CF_API_KEY != '' && secrets.CF_API_KEY || secrets.CURSEFORGE_API_TOKEN }}
          project_id: ${{ secrets.CURSEFORGE_PROJECT_ID != '' && secrets.CURSEFORGE_PROJECT_ID || secrets.CURSEFORGE_PROJECT }}
          game_endpoint: wow
          file_path: TradeShieldTBC.zip
          release_type: release
          changelog: "${{ github.ref_name }}"
