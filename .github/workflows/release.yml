name: release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build release zip
        run: |
          zip -r TradeShieldTBC.zip CHANGELOG.md Core.lua TradeShieldTBC.toc

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: TradeShieldTBC.zip

      - name: Upload to CurseForge
        if: ${{ secrets.CURSEFORGE_API_TOKEN != '' && secrets.CURSEFORGE_PROJECT_ID != '' }}
        uses: itsmeow/curseforge-upload@v3.1.2
        with:
          token: ${{ secrets.CURSEFORGE_API_TOKEN }}
          project_id: ${{ secrets.CURSEFORGE_PROJECT_ID }}
          game_endpoint: wow
          file_path: TradeShieldTBC.zip
          release_type: release
          changelog: ${{ github.ref_name }}
